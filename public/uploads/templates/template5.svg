<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#ffffff"/>
  <!-- Nav -->
  <rect x="0" y="0" width="400" height="40" fill="#1a1a1a"/>
  <rect x="20" y="16" width="55" height="8" fill="#00ff88"/>
  <rect x="150" y="18" width="25" height="4" fill="#666"/>
  <rect x="185" y="18" width="25" height="4" fill="#666"/>
  <rect x="220" y="18" width="25" height="4" fill="#666"/>
  <rect x="350" y="14" width="30" height="12" fill="#00ff88"/>
  <!-- Diagonal clip divider -->
  <polygon points="0,40 400,40 400,100 0,130" fill="#1a1a1a"/>
  <line x1="0" y1="130" x2="400" y2="100" stroke="#00ff88" stroke-width="1"/>
  <!-- Neon accent line -->
  <line x1="20" y1="145" x2="120" y2="145" stroke="#00ff88" stroke-width="2"/>
  <rect x="20" y="155" width="160" height="5" fill="#333"/>
  <rect x="20" y="165" width="120" height="4" fill="#555"/>
  <!-- Industrial cards - no rounded corners -->
  <rect x="20" y="180" width="175" height="65" fill="#1a1a1a"/>
  <rect x="20" y="180" width="3" height="65" fill="#00ff88"/>
  <rect x="32" y="190" width="60" height="5" fill="#00ff88"/>
  <rect x="32" y="200" width="120" height="3" fill="#555"/>
  <rect x="32" y="210" width="90" height="3" fill="#555"/>
  <rect x="32" y="225" width="45" height="8" fill="#00ff88"/>
  <rect x="205" y="180" width="175" height="65" fill="#1a1a1a"/>
  <rect x="205" y="180" width="3" height="65" fill="#00ff88"/>
  <rect x="217" y="190" width="60" height="5" fill="#00ff88"/>
  <rect x="217" y="200" width="120" height="3" fill="#555"/>
  <rect x="217" y="210" width="90" height="3" fill="#555"/>
  <rect x="217" y="225" width="45" height="8" fill="#00ff88"/>
  <!-- Footer -->
  <rect x="0" y="258" width="400" height="42" fill="#1a1a1a"/>
  <line x1="0" y1="258" x2="400" y2="258" stroke="#00ff88" stroke-width="1"/>
  <rect x="20" y="272" width="50" height="4" fill="#555"/>
  <rect x="20" y="280" width="70" height="3" fill="#333"/>
  <rect x="350" y="272" width="30" height="8" fill="#00ff88"/>
</svg>

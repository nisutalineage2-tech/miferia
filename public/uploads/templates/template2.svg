<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#ffffff"/>
  <!-- Nav -->
  <rect x="0" y="0" width="400" height="40" fill="#000000"/>
  <rect x="20" y="16" width="60" height="8" rx="1" fill="#fff"/>
  <rect x="340" y="14" width="40" height="12" rx="2" fill="#e85d6f"/>
  <!-- Bold heading -->
  <text x="20" y="72" font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="#000">BOLD STYLES</text>
  <!-- Asymmetric grid -->
  <!-- Big card -->
  <rect x="20" y="85" width="220" height="130" rx="4" fill="#f5f5f5"/>
  <rect x="20" y="85" width="220" height="130" rx="4" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="30" y="95" width="100" height="14" rx="2" fill="#e85d6f"/>
  <rect x="30" y="115" width="180" height="5" rx="1" fill="#ccc"/>
  <rect x="30" y="125" width="150" height="5" rx="1" fill="#ddd"/>
  <rect x="30" y="135" width="120" height="5" rx="1" fill="#ddd"/>
  <rect x="30" y="155" width="70" height="10" rx="2" fill="#000"/>
  <!-- Small cards -->
  <rect x="250" y="85" width="130" height="62" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="258" y="93" width="50" height="46" rx="2" fill="#e0e0e0"/>
  <rect x="314" y="95" width="58" height="5" rx="1" fill="#ccc"/>
  <rect x="314" y="105" width="40" height="5" rx="1" fill="#ddd"/>
  <rect x="314" y="118" width="30" height="7" rx="1" fill="#e85d6f"/>
  <rect x="250" y="153" width="130" height="62" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="258" y="161" width="50" height="46" rx="2" fill="#e0e0e0"/>
  <rect x="314" y="163" width="58" height="5" rx="1" fill="#ccc"/>
  <rect x="314" y="173" width="40" height="5" rx="1" fill="#ddd"/>
  <rect x="314" y="186" width="30" height="7" rx="1" fill="#e85d6f"/>
  <!-- Footer -->
  <rect x="0" y="255" width="400" height="45" fill="#000"/>
  <rect x="20" y="268" width="50" height="5" rx="1" fill="#666"/>
  <rect x="20" y="278" width="70" height="4" rx="1" fill="#444"/>
  <rect x="360" y="270" width="20" height="8" rx="4" fill="#e85d6f"/>
</svg>

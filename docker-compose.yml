services:
  tuferia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuferia
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN:-hausetienda.com.ar}
      - TUNNEL_TARGET=${TUNNEL_TARGET:-http://192.168.100.131:8081}
    volumes:
      - ./tuferia_data:/app/data
      - ./tuferia_uploads:/app/public/uploads

volumes:
  tuferia_data:
  tuferia_uploads:
